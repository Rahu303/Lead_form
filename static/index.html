<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KeaBuilder AI Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            height: 90vh;
            max-height: 700px;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px 12px 0 0;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 12px;
            opacity: 0.9;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            animation: slideIn 0.3s ease-in-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.assistant {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 15px;
            border-radius: 12px;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.4;
        }

        .message.user .message-content {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-content {
            background: white;
            color: #333;
            border: 1px solid #e0e0e0;
            border-bottom-left-radius: 4px;
        }

        .intent-badge {
            font-size: 11px;
            background: #f0f0f0;
            padding: 4px 8px;
            border-radius: 4px;
            margin-top: 5px;
            display: inline-block;
            color: #666;
        }

        .input-area {
            padding: 20px;
            border-top: 1px solid #e0e0e0;
            background: white;
            border-radius: 0 0 12px 12px;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        #messageInput {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            max-height: 60px;
        }

        #messageInput:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        #sendBtn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #sendBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        #sendBtn:active {
            transform: translateY(0);
        }

        .user-info {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid #e0e0e0;
        }

        .user-info input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            font-size: 13px;
            margin-bottom: 10px;
        }

        .user-info input:last-child {
            margin-bottom: 0;
        }

        .user-info input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.1);
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            padding: 10px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: scale(0);
                opacity: 0.5;
            }
            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .error-message {
            background: #fee;
            color: #c00;
            padding: 10px;
            border-radius: 4px;
            border-left: 4px solid #c00;
            margin-bottom: 10px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 KeaBuilder AI</h1>
            <p>Intelligent Lead Qualification Chat</p>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="user-info">
                <input type="email" id="userEmail" placeholder="Your email" value="">
                <input type="text" id="userName" placeholder="Your name" value="">
            </div>
            <div style="text-align: center; color: #999; padding: 20px;">
                💬 Start the conversation!
            </div>
        </div>

        <div class="input-area">
            <div id="errorContainer"></div>
            <div class="input-group">
                <textarea id="messageInput" placeholder="Type your message..." rows="1"></textarea>
                <button id="sendBtn">Send</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        const chatMessages = document.getElementById("chatMessages");
        const messageInput = document.getElementById("messageInput");
        const sendBtn = document.getElementById("sendBtn");
        const userEmailInput = document.getElementById("userEmail");
        const userNameInput = document.getElementById("userName");
        const errorContainer = document.getElementById("errorContainer");

        // Auto-resize textarea
        messageInput.addEventListener("input", () => {
            messageInput.style.height = "auto";
            messageInput.style.height = Math.min(messageInput.scrollHeight, 60) + "px";
        });

        // Send message on Enter
        messageInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener("click", sendMessage);

        async function sendMessage() {
            const message = messageInput.value.trim();
            const email = userEmailInput.value.trim();
            const name = userNameInput.value.trim();

            if (!message || !email || !name) {
                showError("Please fill in all fields.");
                return;
            }

            // Display user message
            addMessage(message, "user");
            messageInput.value = "";
            messageInput.style.height = "auto";
            errorContainer.innerHTML = "";

            // Show loading state
            const loadingId = addLoading();

            try {
                const response = await fetch(`${API_URL}/chat`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        user_email: email,
                        user_name: name,
                        message: message
                    })
                });

                removeLoading(loadingId);

                if (!response.ok) {
                    throw new Error(`Error: ${response.statusText}`);
                }

                const data = await response.json();
                
                // Display assistant response
                addMessage(data.response, "assistant", data.intent, data.llm_provider);

            } catch (error) {
                removeLoading(loadingId);
                console.error("Error:", error);
                showError("Failed to get response. Check console and ensure backend is running.");
            }
        }

        function addMessage(text, sender, intent = null, provider = null) {
            const messageDiv = document.createElement("div");
            messageDiv.className = `message ${sender}`;

            const contentDiv = document.createElement("div");
            contentDiv.className = "message-content";
            contentDiv.textContent = text;

            if (sender === "assistant" && intent) {
                const badge = document.createElement("div");
                badge.className = "intent-badge";
                badge.textContent = `🎯 ${intent}`;
                contentDiv.appendChild(badge);
            }

            messageDiv.appendChild(contentDiv);
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function addLoading() {
            const loadingDiv = document.createElement("div");
            loadingDiv.className = "message assistant";
            loadingDiv.id = "loading";
            loadingDiv.innerHTML = `<div class="loading"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
            chatMessages.appendChild(loadingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return loadingDiv;
        }

        function removeLoading(element) {
            if (element && element.parentNode) {
                element.parentNode.removeChild(element);
            }
        }

        function showError(message) {
            errorContainer.innerHTML = `<div class="error-message">⚠️ ${message}</div>`;
        }

        // Load saved values
        document.addEventListener("DOMContentLoaded", () => {
            userEmailInput.value = localStorage.getItem("userEmail") || "";
            userNameInput.value = localStorage.getItem("userName") || "";

            userEmailInput.addEventListener("change", () => {
                localStorage.setItem("userEmail", userEmailInput.value);
            });

            userNameInput.addEventListener("change", () => {
                localStorage.setItem("userName", userNameInput.value);
            });
        });
    </script>
</body>
</html>
